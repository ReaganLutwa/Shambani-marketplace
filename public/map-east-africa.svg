<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <!-- Background -->
  <rect width="600" height="400" rx="16" fill="#F5F5F0"/>

  <!-- Simplified East Africa map shapes -->
  <!-- Tanzania -->
  <path d="M250 180 L260 130 L310 125 L350 140 L360 180 L370 220 L360 260 L340 290 L320 300 L290 295 L270 280 L255 250 L245 220 Z" fill="#E8E6E1" stroke="#9E9D99" stroke-width="1.5"/>
  <text x="300" y="210" font-family="Inter, sans-serif" font-size="11" fill="#9E9D99" text-anchor="middle" font-weight="500">Tanzania</text>

  <!-- Kenya -->
  <path d="M260 130 L270 80 L310 60 L350 65 L380 90 L385 130 L370 150 L350 140 L310 125 Z" fill="#E8E6E1" stroke="#9E9D99" stroke-width="1.5"/>
  <text x="320" y="105" font-family="Inter, sans-serif" font-size="11" fill="#9E9D99" text-anchor="middle" font-weight="500">Kenya</text>

  <!-- Uganda -->
  <path d="M195 100 L200 60 L240 55 L270 80 L260 130 L245 155 L215 150 L195 130 Z" fill="#2E7D32" stroke="#1B5E20" stroke-width="1.5" opacity="0.9"/>
  <text x="230" y="105" font-family="Inter, sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="600">Uganda</text>

  <!-- Rwanda -->
  <path d="M215 155 L225 145 L245 148 L250 162 L240 170 L220 168 Z" fill="#2E7D32" stroke="#1B5E20" stroke-width="1" opacity="0.85"/>
  <text x="233" y="162" font-family="Inter, sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="600">Rwanda</text>

  <!-- Highlighted country labels for active ones -->
  <!-- Uganda pulsing dot -->
  <circle cx="230" cy="95" r="4" fill="#1B5E20">
    <animate attributeName="r" values="4;7;4" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="230" cy="95" r="4" fill="#1B5E20"/>

  <!-- Kenya pulsing dot -->
  <circle cx="320" cy="95" r="4" fill="#2E7D32">
    <animate attributeName="r" values="4;7;4" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="320" cy="95" r="4" fill="#2E7D32"/>

  <!-- Tanzania pulsing dot -->
  <circle cx="305" cy="215" r="4" fill="#2E7D32">
    <animate attributeName="r" values="4;7;4" dur="2s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="305" cy="215" r="4" fill="#2E7D32"/>

  <!-- Rwanda pulsing dot -->
  <circle cx="233" cy="158" r="3" fill="#1B5E20">
    <animate attributeName="r" values="3;5;3" dur="2s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="233" cy="158" r="3" fill="#1B5E20"/>

  <!-- Country labels with counts -->
  <g transform="translate(420, 100)">
    <rect x="0" y="0" width="140" height="28" rx="8" fill="#2E7D32" opacity="0.1"/>
    <circle cx="16" cy="14" r="5" fill="#2E7D32"/>
    <text x="28" y="11" font-family="Poppins, sans-serif" font-size="10" fill="#1B5E20" font-weight="600">Uganda</text>
    <text x="28" y="22" font-family="Inter, sans-serif" font-size="8" fill="#9E9D99">111 districts</text>
  </g>

  <g transform="translate(420, 140)">
    <rect x="0" y="0" width="140" height="28" rx="8" fill="#E8E6E1" opacity="0.5"/>
    <circle cx="16" cy="14" r="5" fill="#9E9D99"/>
    <text x="28" y="11" font-family="Poppins, sans-serif" font-size="10" fill="#2C2C2C" font-weight="600">Kenya</text>
    <text x="28" y="22" font-family="Inter, sans-serif" font-size="8" fill="#9E9D99">47 counties</text>
  </g>

  <g transform="translate(420, 180)">
    <rect x="0" y="0" width="140" height="28" rx="8" fill="#E8E6E1" opacity="0.5"/>
    <circle cx="16" cy="14" r="5" fill="#9E9D99"/>
    <text x="28" y="11" font-family="Poppins, sans-serif" font-size="10" fill="#2C2C2C" font-weight="600">Tanzania</text>
    <text x="28" y="22" font-family="Inter, sans-serif" font-size="8" fill="#9E9D99">31 regions</text>
  </g>

  <g transform="translate(420, 220)">
    <rect x="0" y="0" width="140" height="28" rx="8" fill="#E8E6E1" opacity="0.5"/>
    <circle cx="16" cy="14" r="5" fill="#9E9D99"/>
    <text x="28" y="11" font-family="Poppins, sans-serif" font-size="10" fill="#2C2C2C" font-weight="600">Rwanda</text>
    <text x="28" y="22" font-family="Inter, sans-serif" font-size="8" fill="#9E9D99">30 districts</text>
  </g>
</svg>