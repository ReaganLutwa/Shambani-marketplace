<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 40" fill="none">
  <g>
    <!-- Leaf sprout icon -->
    <g transform="translate(0, 4)">
      <!-- Center stem -->
      <rect x="13" y="14" width="3" height="18" rx="1.5" fill="#1B5E20"/>
      <!-- Left leaf -->
      <ellipse cx="9" cy="16" rx="7" ry="10" transform="rotate(-30 9 16)" fill="#1B5E20"/>
      <ellipse cx="9.5" cy="16.5" rx="4" ry="6" transform="rotate(-30 9.5 16.5)" fill="#2E7D32"/>
      <!-- Right leaf -->
      <ellipse cx="20" cy="16" rx="7" ry="10" transform="rotate(30 20 16)" fill="#1B5E20"/>
      <ellipse cx="19.5" cy="16.5" rx="4" ry="6" transform="rotate(30 19.5 16.5)" fill="#2E7D32"/>
      <!-- Top leaf -->
      <ellipse cx="14.5" cy="9" rx="5" ry="9" transform="rotate(0 14.5 9)" fill="#1B5E20"/>
      <ellipse cx="14.5" cy="10" rx="3" ry="5.5" transform="rotate(0 14.5 10)" fill="#4CAF50"/>
    </g>
    <!-- Text: ShambaNi -->
    <text x="36" y="28" font-family="Poppins, sans-serif" font-weight="700" font-size="22" fill="#1B5E20" letter-spacing="-0.01em">ShambaNi</text>
  </g>
</svg>